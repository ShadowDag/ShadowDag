name: Desktop Wallet Release

on:
  push:
    tags:
      - 'v*'
      - 'wallet-*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag name (e.g. wallet-v1.0.0)'
        required: true
        default: 'wallet-v1.0.0'

permissions:
  contents: write

jobs:
  # ── Windows ──────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build unified wallet (GUI + CLI)
        run: cargo build --release --bin shadowdag-wallet --features desktop

      - name: Package
        shell: bash
        run: |
          mkdir -p DesktopWallet-windows-x86_64
          cp target/release/shadowdag-wallet.exe DesktopWallet-windows-x86_64/
          cat > DesktopWallet-windows-x86_64/README.txt << 'EOF'
          ╔══════════════════════════════════════════════════╗
          ║       ShadowDAG Wallet — Windows                ║
          ╚══════════════════════════════════════════════════╝

          ONE FILE — does both GUI and CLI (like Litecoin-Qt).

          GUI MODE (default):
            Double-click shadowdag-wallet.exe

          CLI MODE (from Command Prompt):
            shadowdag-wallet.exe new              — Create new wallet
            shadowdag-wallet.exe balance           — Check balance
            shadowdag-wallet.exe send <to> <amount> — Send SDAG
            shadowdag-wallet.exe info              — Show wallet info
            shadowdag-wallet.exe help              — Show all commands

          OPTIONS:
            --gui                 Force GUI mode (ignore subcommand)
            --rpc=127.0.0.1:9332  Custom node RPC endpoint
            --network=testnet      Connect to testnet (port 19332)

          REQUIREMENTS:
            - A running ShadowDAG node (for GUI balance/network queries)
            - WebView2 Runtime (included in Windows 11; on Windows 10
              download: https://developer.microsoft.com/microsoft-edge/webview2/)
          EOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DesktopWallet-windows-x86_64
          path: DesktopWallet-windows-x86_64/

  # ── Linux ────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Build unified wallet (GUI + CLI)
        run: cargo build --release --bin shadowdag-wallet --features desktop

      - name: Package
        run: |
          mkdir -p DesktopWallet-linux-x86_64
          cp target/release/shadowdag-wallet DesktopWallet-linux-x86_64/
          chmod +x DesktopWallet-linux-x86_64/shadowdag-wallet
          cat > DesktopWallet-linux-x86_64/README.txt << 'EOF'
          ╔══════════════════════════════════════════════════╗
          ║       ShadowDAG Wallet — Linux                  ║
          ╚══════════════════════════════════════════════════╝

          ONE FILE — does both GUI and CLI (like Litecoin-Qt).

          GUI MODE (default):
            ./shadowdag-wallet

          CLI MODE:
            ./shadowdag-wallet new              — Create new wallet
            ./shadowdag-wallet balance           — Check balance
            ./shadowdag-wallet send <to> <amount> — Send SDAG
            ./shadowdag-wallet info              — Show wallet info
            ./shadowdag-wallet help              — Show all commands

          OPTIONS:
            --gui                 Force GUI mode
            --rpc=127.0.0.1:9332  Custom node RPC endpoint
            --network=testnet      Connect to testnet (port 19332)

          REQUIREMENTS:
            - WebKitGTK 4.1: sudo apt install libwebkit2gtk-4.1-0
            - GTK 3:         sudo apt install libgtk-3-0
            - A running ShadowDAG node
          EOF
          tar czf DesktopWallet-linux-x86_64.tar.gz DesktopWallet-linux-x86_64/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DesktopWallet-linux-x86_64
          path: DesktopWallet-linux-x86_64.tar.gz

  # ── macOS ────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build unified wallet (GUI + CLI)
        run: cargo build --release --bin shadowdag-wallet --features desktop

      - name: Package
        run: |
          mkdir -p DesktopWallet-macos-arm64
          cp target/release/shadowdag-wallet DesktopWallet-macos-arm64/
          chmod +x DesktopWallet-macos-arm64/shadowdag-wallet
          cat > DesktopWallet-macos-arm64/README.txt << 'EOF'
          ╔══════════════════════════════════════════════════╗
          ║       ShadowDAG Wallet — macOS                  ║
          ╚══════════════════════════════════════════════════╝

          ONE FILE — does both GUI and CLI (like Litecoin-Qt).

          GUI MODE (default):
            ./shadowdag-wallet

          CLI MODE:
            ./shadowdag-wallet new              — Create new wallet
            ./shadowdag-wallet balance           — Check balance
            ./shadowdag-wallet send <to> <amount> — Send SDAG
            ./shadowdag-wallet info              — Show wallet info
            ./shadowdag-wallet help              — Show all commands

          OPTIONS:
            --gui                 Force GUI mode
            --rpc=127.0.0.1:9332  Custom node RPC endpoint
            --network=testnet      Connect to testnet (port 19332)

          NOTE: macOS may show a security warning on first run.
            Go to System Settings > Privacy & Security > click "Open Anyway"
            Or run: xattr -d com.apple.quarantine shadowdag-wallet

          REQUIREMENTS:
            - A running ShadowDAG node (uses WKWebView, no extra deps)
          EOF
          tar czf DesktopWallet-macos-arm64.tar.gz DesktopWallet-macos-arm64/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DesktopWallet-macos-arm64
          path: DesktopWallet-macos-arm64.tar.gz

  # ── Create Release ──────────────────────────────────────
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: DesktopWallet-windows-x86_64
          path: DesktopWallet-windows-x86_64

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: DesktopWallet-linux-x86_64

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: DesktopWallet-macos-arm64

      - name: Package Windows as zip
        run: |
          sudo apt-get install -y zip
          zip -r DesktopWallet-windows-x86_64.zip DesktopWallet-windows-x86_64/

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "ShadowDAG Wallet — ${{ steps.tag.outputs.tag }}"
          files: |
            DesktopWallet-windows-x86_64.zip
            DesktopWallet-linux-x86_64.tar.gz
            DesktopWallet-macos-arm64.tar.gz
          body: |
            ## ShadowDAG Wallet

            **ONE file** that does both GUI and CLI — like Litecoin-Qt / Bitcoin Core.

            - **Double-click** → opens the desktop GUI
            - **From terminal with a subcommand** → acts as the CLI wallet

            ### Downloads

            | Platform | File | Architecture |
            |----------|------|-------------|
            | **Windows** | `DesktopWallet-windows-x86_64.zip` | x86_64 |
            | **Linux** | `DesktopWallet-linux-x86_64.tar.gz` | x86_64 |
            | **macOS** | `DesktopWallet-macos-arm64.tar.gz` | ARM64 (Apple Silicon) |

            ### Quick Start

            1. Download and extract for your OS
            2. Make sure a ShadowDAG node is running (`shadowdag-node --network=mainnet`)
            3. Double-click `shadowdag-wallet` to open the GUI

            ### CLI Commands

            ```bash
            shadowdag-wallet new              # Create new wallet
            shadowdag-wallet balance           # Check balance
            shadowdag-wallet send <to> <amt>   # Send SDAG
            shadowdag-wallet info              # Show wallet info
            shadowdag-wallet help              # Full CLI reference
            ```

            ### GUI Options

            ```bash
            shadowdag-wallet                       # Mainnet (default)
            shadowdag-wallet --rpc=127.0.0.1:19332 # Testnet
            shadowdag-wallet --network=testnet      # Force network name
            shadowdag-wallet --gui                  # Force GUI (ignore subcommand)
            ```

            ### Requirements

            | Platform | Requirement |
            |----------|------------|
            | Windows | WebView2 Runtime (included in Windows 11) |
            | Linux | `libwebkit2gtk-4.1-0`, `libgtk-3-0` |
            | macOS | None (uses system WKWebView) |
